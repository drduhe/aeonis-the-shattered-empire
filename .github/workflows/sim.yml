name: Sim tests

on:
  push:
    paths:
      - "sim/**"
      - ".github/workflows/sim.yml"
  pull_request:
    paths:
      - "sim/**"
      - ".github/workflows/sim.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest -q

  regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    strategy:
      fail-fast: false
      matrix:
        config:
          - configs/regression-plan1-baseline.json
          - configs/regression-plan1-prestrike.json
          - configs/regression-plan2-baseline.json
          - configs/regression-plan2-cap-rally.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Plan regression gate
        run: python scripts/regression_check.py --config ${{ matrix.config }} --workers 4

  m2-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: M2 gate (mixed 4p smoke)
        run: python scripts/regression_check.py --config configs/bracket-m2-ci.json --workers 4

  m3-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: M3 gate (mixed 4p smoke)
        run: python scripts/regression_check.py --config configs/bracket-m3-ci.json --workers 4
